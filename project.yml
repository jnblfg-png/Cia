# project.yml — XcodeGen spec for ChainMark/Evidia
# -------------------------------------------------
# Generates a real ChainMark.xcodeproj (the repo ships only an empty stub).
# On the Mac:  brew install xcodegen  &&  xcodegen generate  &&  open ChainMark.xcodeproj
# See TESTFLIGHT.md for the full handoff runbook.

name: ChainMark
options:
  bundleIdPrefix: com.chainmark
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"          # CFBundleShortVersionString
    CURRENT_PROJECT_VERSION: "1"        # CFBundleVersion (Fastlane bumps this)
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""                # TODO: set your 10-char Apple Team ID (or set in Xcode UI)
    CODE_SIGN_STYLE: Automatic          # automatic signing recommended for the pilot
    # Supabase live creds — provide via xcconfig/env, surfaced through Info.plist.
    # SUPABASE_URL and SUPABASE_ANON_KEY are read by Configuration.swift.

targets:
  ChainMark:
    type: application
    platform: iOS
    sources:
      - path: ChainMark
    info:
      path: ChainMark/Info.plist
      # Info.plist is maintained by hand in the repo; XcodeGen uses it as-is.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chainmark.app
        INFOPLIST_FILE: ChainMark/Info.plist
        CODE_SIGN_ENTITLEMENTS: ChainMark/ChainMark.entitlements
        # Surface Supabase creds into Info.plist at build time so the app can read them:
        INFOPLIST_KEY_SUPABASE_URL: "$(SUPABASE_URL)"
        INFOPLIST_KEY_SUPABASE_ANON_KEY: "$(SUPABASE_ANON_KEY)"
    entitlements:
      path: ChainMark/ChainMark.entitlements
    # NOTE: add an AppIcon asset catalog (Assets.xcassets) before uploading —
    # TestFlight rejects builds without an app icon (punch item P7).
